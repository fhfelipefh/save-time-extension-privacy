<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Política de Privacidade</title>
  <meta name="description" content="Política de Privacidade pública para extensões de navegador.">
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #5b6472;
      --border: #d7dfeb;
      --accent: #0f4c81;
      --accent-soft: #e8f1fa;
      --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, #eef5ff 0, #f4f7fb 42%, #edf2f8 100%);
      color: var(--text);
      line-height: 1.65;
    }

    .container {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      padding: 48px 0 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-card {
      padding: 36px;
      background:
        linear-gradient(135deg, rgba(15, 76, 129, 0.08), rgba(15, 76, 129, 0.02)),
        var(--surface);
    }

    .eyebrow {
      display: inline-block;
      margin: 0 0 14px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.15;
    }

    .lead {
      margin: 0;
      max-width: 62ch;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .meta {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.95rem;
    }

    main {
      padding-bottom: 48px;
    }

    .policy {
      padding: 10px;
    }

    section {
      padding: 28px 26px;
      border-bottom: 1px solid var(--border);
    }

    section:last-child {
      border-bottom: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.35rem;
      color: var(--accent);
    }

    p {
      margin: 0 0 14px;
    }

    p:last-child {
      margin-bottom: 0;
    }

    ul {
      margin: 0;
      padding-left: 20px;
      color: var(--text);
    }

    li + li {
      margin-top: 8px;
    }

    .contact-box {
      margin-top: 12px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fbfdff;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }

    footer {
      padding: 0 24px 48px;
      color: var(--muted);
      text-align: center;
      font-size: 0.94rem;
    }

    @media (max-width: 640px) {
      .container {
        padding: 16px;
      }

      .hero {
        padding-top: 20px;
      }

      .hero-card {
        padding: 24px;
      }

      section {
        padding: 22px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="card hero-card">
        <p class="eyebrow">Documento público</p>
        <h1 id="policy-title">Política de Privacidade</h1>
        <p class="lead" id="policy-lead"></p>
        <div class="meta">
          <strong>Última atualização:</strong> <span id="policy-updated"></span>
        </div>
      </div>
    </header>

    <main>
      <div class="card policy" id="policy-content"></div>
    </main>
  </div>

  <footer id="policy-footer"></footer>

  <script>
    const contactEmail = "felipehonorio55@gmail.com";

    const policies = {
      saveTime: {
        appName: "Save Time Extension",
        title: "Política de Privacidade da Save Time Extension",
        description: "Política de Privacidade da Save Time Extension.",
        lead: "Esta política descreve, de forma objetiva, como a Save Time Extension trata as informações armazenadas para viabilizar automações configuradas pelo próprio usuário.",
        updated: "19/06/2026",
        footer: "Save Time Extension — Política de Privacidade pública.",
        sections: [
          {
            id: "introducao",
            title: "1. Introdução",
            paragraphs: [
              "A Save Time Extension é uma extensão de navegador criada para automatizar preenchimentos de formulários e tarefas repetitivas em páginas da web, conforme regras configuradas pelo próprio usuário.",
              "Esta política explica quais informações podem ser armazenadas pela extensão, para qual finalidade elas são utilizadas e quais controles permanecem sob responsabilidade do usuário."
            ]
          },
          {
            id: "dados-armazenados",
            title: "2. Dados armazenados",
            paragraphs: [
              "A extensão pode armazenar localmente no navegador as configurações criadas pelo usuário, incluindo sites habilitados, regras de preenchimento, seletores de campos, tipos de automação e valores definidos pelo usuário para preenchimento automático.",
              "Dependendo das regras criadas pelo usuário, esses valores podem conter informações pessoais, como nome, e-mail, telefone, endereço, cidade, profissão, datas ou outros dados digitados voluntariamente pelo usuário."
            ]
          },
          {
            id: "finalidade",
            title: "3. Finalidade do uso dos dados",
            paragraphs: [
              "Os dados são usados exclusivamente para permitir o funcionamento da extensão, incluindo salvar regras por site e reaplicá-las em páginas compatíveis quando o usuário acessar novamente esses sites.",
              "A Save Time Extension não utiliza essas informações para perfilamento, publicidade, enriquecimento de base de dados ou qualquer outra finalidade alheia à automação configurada pelo próprio usuário."
            ]
          },
          {
            id: "armazenamento-local",
            title: "4. Armazenamento local",
            paragraphs: [
              "As informações são armazenadas localmente no navegador por meio dos mecanismos de armazenamento do Chrome. Isso significa que os dados permanecem no ambiente do navegador do próprio usuário, vinculados ao uso da extensão.",
              "A extensão não envia essas informações para servidores externos, não mantém banco de dados remoto e não depende de backend para guardar regras ou valores de preenchimento."
            ]
          },
          {
            id: "compartilhamento",
            title: "5. Compartilhamento de dados",
            paragraphs: [
              "A extensão não vende, transfere, compartilha ou divulga dados do usuário para terceiros.",
              "Também não existe sincronização com servidores próprios, repasse comercial de dados ou integração destinada ao compartilhamento das informações configuradas pelo usuário."
            ]
          },
          {
            id: "coleta-automatica",
            title: "6. Coleta automática",
            paragraphs: [
              "A extensão não coleta histórico de navegação, não realiza rastreamento para publicidade, não utiliza analytics externo e não monitora a atividade do usuário para finalidades não relacionadas ao funcionamento da extensão.",
              "Qualquer leitura de página ocorre apenas para permitir a configuração e a execução das automações desejadas pelo usuário nos sites onde ele optar por utilizar a extensão."
            ]
          },
          {
            id: "permissoes",
            title: "7. Permissões do navegador",
            paragraphs: [
              "A extensão utiliza permissões do navegador para identificar a aba atual, acessar páginas em que o usuário deseja configurar automações, salvar regras localmente e aplicar os preenchimentos configurados pelo usuário."
            ],
            items: [
              "Identificar a aba atual e o site em uso para associar regras ao domínio correto.",
              "Acessar o conteúdo das páginas nas quais o usuário deseja configurar automações.",
              "Salvar localmente regras, seletores, tipos de automação e valores definidos pelo usuário.",
              "Aplicar preenchimentos automáticos ou ações configuradas pelo usuário em páginas compatíveis."
            ]
          },
          {
            id: "controle",
            title: "8. Controle do usuário",
            paragraphs: [
              "O usuário pode remover ou alterar suas regras a qualquer momento pela interface da extensão.",
              "O usuário também pode excluir os dados da extensão removendo a extensão do navegador ou limpando os dados armazenados pelo navegador. Como o armazenamento é local, o controle sobre permanência e exclusão dessas informações permanece com o próprio usuário."
            ]
          },
          {
            id: "alteracoes",
            title: "9. Alterações nesta política",
            paragraphs: [
              "Esta política pode ser atualizada para refletir mudanças na extensão ou em seus recursos.",
              "Quando houver alterações relevantes, a data de atualização deste documento será revisada para indicar a versão mais recente da política publicada."
            ]
          }
        ]
      },
      zapPdf: {
        appName: "ZapPDF — Imagens em PDF",
        title: "Política de Privacidade do ZapPDF — Imagens em PDF",
        description: "Política de Privacidade do ZapPDF — Imagens em PDF.",
        lead: "Esta política descreve como o ZapPDF — Imagens em PDF trata arquivos e informações usados para converter imagens selecionadas pelo usuário em documentos PDF.",
        updated: "24/06/2026",
        footer: "ZapPDF — Imagens em PDF — Política de Privacidade pública.",
        sections: [
          {
            id: "introducao",
            title: "1. Introdução",
            paragraphs: [
              "O ZapPDF — Imagens em PDF é uma extensão de navegador criada para auxiliar o usuário a transformar imagens selecionadas por ele em arquivos PDF.",
              "Esta política explica quais dados podem ser acessados durante o uso da extensão, para qual finalidade eles são utilizados e como o usuário mantém controle sobre seus arquivos."
            ]
          },
          {
            id: "dados-processados",
            title: "2. Dados processados",
            paragraphs: [
              "A extensão processa apenas os arquivos de imagem escolhidos voluntariamente pelo usuário para gerar um PDF. Esses arquivos podem conter informações pessoais ou sensíveis caso o próprio usuário selecione imagens com esse conteúdo.",
              "A extensão também pode armazenar localmente preferências técnicas necessárias para o funcionamento, como configurações de conversão, ordem de imagens ou opções escolhidas pelo usuário durante a criação do PDF."
            ]
          },
          {
            id: "finalidade",
            title: "3. Finalidade do uso dos dados",
            paragraphs: [
              "Os arquivos e preferências são usados exclusivamente para converter imagens em PDF e entregar o arquivo final ao usuário.",
              "O ZapPDF — Imagens em PDF não utiliza imagens, nomes de arquivos ou preferências para publicidade, rastreamento, perfilamento, venda de dados ou qualquer finalidade não relacionada à conversão solicitada pelo usuário."
            ]
          },
          {
            id: "processamento-local",
            title: "4. Processamento local",
            paragraphs: [
              "A conversão das imagens em PDF ocorre no ambiente do navegador do usuário. A extensão não envia os arquivos selecionados para servidores próprios, não mantém banco de dados remoto e não armazena cópias dos PDFs gerados fora do dispositivo do usuário.",
              "O arquivo PDF final é disponibilizado ao usuário no próprio navegador ou por meio dos recursos de download do Chrome, conforme a ação escolhida pelo usuário."
            ]
          },
          {
            id: "compartilhamento",
            title: "5. Compartilhamento de dados",
            paragraphs: [
              "A extensão não vende, transfere, compartilha ou divulga arquivos, imagens, PDFs ou dados do usuário para terceiros.",
              "Também não há sincronização com servidores externos, repasse comercial de dados ou integração destinada ao compartilhamento das imagens processadas."
            ]
          },
          {
            id: "coleta-automatica",
            title: "6. Coleta automática",
            paragraphs: [
              "A extensão não coleta histórico de navegação, não realiza rastreamento para publicidade, não utiliza analytics externo e não monitora a atividade do usuário para finalidades não relacionadas à criação do PDF.",
              "Qualquer acesso a arquivos ocorre apenas quando o usuário seleciona imagens para conversão ou aciona recursos necessários para gerar e baixar o PDF."
            ]
          },
          {
            id: "permissoes",
            title: "7. Permissões do navegador",
            paragraphs: [
              "A extensão pode usar permissões do navegador apenas para executar seus recursos principais de seleção, processamento e geração de arquivos PDF."
            ],
            items: [
              "Ler imagens selecionadas voluntariamente pelo usuário para conversão em PDF.",
              "Processar localmente as imagens escolhidas para montar o documento PDF.",
              "Permitir o download ou salvamento do PDF gerado pelo usuário.",
              "Salvar preferências locais relacionadas ao funcionamento da extensão, quando necessário."
            ]
          },
          {
            id: "controle",
            title: "8. Controle do usuário",
            paragraphs: [
              "O usuário controla quais imagens serão selecionadas, convertidas e salvas como PDF.",
              "O usuário pode remover arquivos gerados diretamente em seu dispositivo e pode apagar dados locais da extensão removendo a extensão do navegador ou limpando os dados armazenados pelo Chrome."
            ]
          },
          {
            id: "alteracoes",
            title: "9. Alterações nesta política",
            paragraphs: [
              "Esta política pode ser atualizada para refletir mudanças na extensão ou em seus recursos.",

            ]
          }
        ]
      }
    };

    function createParagraph(text) {
      const paragraph = document.createElement("p");
      paragraph.textContent = text;
      return paragraph;
    }

    function createSection(section) {
      const element = document.createElement("section");
      element.id = section.id;

      const heading = document.createElement("h2");
      heading.textContent = section.title;
      element.appendChild(heading);

      section.paragraphs.forEach((text) => {
        element.appendChild(createParagraph(text));
      });

      if (section.items) {
        const list = document.createElement("ul");
        section.items.forEach((text) => {
          const item = document.createElement("li");
          item.textContent = text;
          list.appendChild(item);
        });
        element.appendChild(list);
      }

      return element;
    }

    function selectPolicy() {
      const route = decodeURIComponent(
        `${window.location.pathname} ${window.location.search} ${window.location.hash}`
      ).toLowerCase();

      const zapPdfTokens = [
        "zappdf",
        "zap-pdf",
        "zap_pdf",
        "zap pdf",
        "imagens-em-pdf",
        "imagens-pdf",
        "bimcejdbgcpblfeijkpgcofpiionfjcl"
      ];

      return zapPdfTokens.some((token) => route.includes(token))
        ? policies.zapPdf
        : policies.saveTime;
    }

    function renderPolicy(policy) {
      document.title = policy.title;
      document.querySelector("meta[name='description']").setAttribute("content", policy.description);
      document.getElementById("policy-title").textContent = policy.title;
      document.getElementById("policy-lead").textContent = policy.lead;
      document.getElementById("policy-updated").textContent = policy.updated;
      document.getElementById("policy-footer").textContent = policy.footer;

      const content = document.getElementById("policy-content");
      content.replaceChildren();
      policy.sections.forEach((section) => {
        content.appendChild(createSection(section));
      });

      const contactSection = document.createElement("section");
      contactSection.id = "contato";
      const contactTitle = document.createElement("h2");
      contactTitle.textContent = "10. Contato";
      contactSection.appendChild(contactTitle);
      contactSection.appendChild(
        createParagraph(
          `Em caso de dúvidas sobre esta Política de Privacidade ou sobre o funcionamento do ${policy.appName}, entre em contato pelo e-mail abaixo:`
        )
      );

      const contactBox = document.createElement("div");
      contactBox.className = "contact-box";
      const label = document.createElement("strong");
      label.textContent = "E-mail: ";
      const link = document.createElement("a");
      link.href = `mailto:${contactEmail}`;
      link.textContent = contactEmail;
      contactBox.append(label, link);
      contactSection.appendChild(contactBox);
      content.appendChild(contactSection);
    }

    renderPolicy(selectPolicy());
  </script>
</body>
</html>
