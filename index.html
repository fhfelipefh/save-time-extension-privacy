<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Time Extension</title>
  <meta http-equiv="refresh" content="0; url=privacy-policy.html">
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #5b6472;
      --accent: #0f4c81;
      --border: #d7dfeb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .card {
      width: min(100%, 560px);
      padding: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Save Time Extension</h1>
    <p>
      Redirecionando para a
      <a href="privacy-policy.html">Política de Privacidade</a>.
    </p>
  </main>
</body>
</html>
